services:
  # --- Kafka (Apache oficial) - KRaft (sin ZooKeeper) ---
  kafka:
    image: apache/kafka:4.1.1
    container_name: food-kafka
    environment:
      - TZ=${TZ}

      # KRaft combined mode (broker + controller en el mismo contenedor)
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller

      # 3 listeners:
      # - PLAINTEXT (interno Docker) para otros contenedores (kafka-ui, microservicios en docker)
      # - PLAINTEXT_HOST (host Windows) para tus apps corriendo en tu máquina (IDE, Angular, etc.)
      # - CONTROLLER para el quorum (KRaft)
      - KAFKA_LISTENERS=PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093

      # Single node settings (replication factors)
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0

      # Conveniencia para dev
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=3
    ports:
      - "9092:9092"
    networks: [foodnet]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: food-kafka-ui
    depends_on: [kafka]
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      # Importante: desde dentro de Docker se conecta al listener interno
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:19092
    ports:
      - "8088:8080"
    networks: [foodnet]

  # --- Postgres (uno por microservicio) ---
  postgres-users:
    image: postgres:16-alpine
    container_name: pg-users
    environment:
      - POSTGRES_DB=usersdb
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "${PG_USERS_PORT}:5432"
    volumes:
      - pg_users:/var/lib/postgresql/data
    networks: [foodnet]

  postgres-catalog:
    image: postgres:16-alpine
    container_name: pg-catalog
    environment:
      - POSTGRES_DB=catalogdb
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "${PG_CATALOG_PORT}:5432"
    volumes:
      - pg_catalog:/var/lib/postgresql/data
    networks: [foodnet]

  postgres-orders:
    image: postgres:16-alpine
    container_name: pg-orders
    environment:
      - POSTGRES_DB=ordersdb
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "${PG_ORDERS_PORT}:5432"
    volumes:
      - pg_orders:/var/lib/postgresql/data
    networks: [foodnet]

  postgres-payments:
    image: postgres:16-alpine
    container_name: pg-payments
    environment:
      - POSTGRES_DB=paymentsdb
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "${PG_PAYMENTS_PORT}:5432"
    volumes:
      - pg_payments:/var/lib/postgresql/data
    networks: [foodnet]

  postgres-deliveries:
    image: postgres:16-alpine
    container_name: pg-deliveries
    environment:
      - POSTGRES_DB=deliveriesdb
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
    ports:
      - "${PG_DELIVERIES_PORT}:5432"
    volumes:
      - pg_deliveries:/var/lib/postgresql/data
    networks: [foodnet]

  # --- Keycloak + su DB ---
  postgres-keycloak:
    image: postgres:16-alpine
    container_name: pg-keycloak
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=${KC_DB_USER}
      - POSTGRES_PASSWORD=${KC_DB_PASSWORD}
    ports:
      - "${PG_KEYCLOAK_PORT}:5432"
    volumes:
      - pg_keycloak:/var/lib/postgresql/data
    networks: [foodnet]

  keycloak:
    image: keycloak/keycloak:25.0
    container_name: food-keycloak
    depends_on: [postgres-keycloak]
    command: ["start-dev", "--import-realm"]
    environment:
      - TZ=${TZ}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-keycloak:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USER}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD}
      - KC_HTTP_PORT=8080
      # Dev (detrás de proxy/ingress luego)
      - KC_PROXY=edge
    ports:
      - "8080:8080"
    volumes:
      - ../keycloak:/opt/keycloak/data/import
    networks: [foodnet]

networks:
  foodnet:

volumes:
  pg_users:
  pg_catalog:
  pg_orders:
  pg_payments:
  pg_deliveries:
  pg_keycloak: