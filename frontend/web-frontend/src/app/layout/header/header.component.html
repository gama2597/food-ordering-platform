<p-toolbar styleClass="border-none border-bottom-1 surface-border border-noround bg-white px-4 py-3 m-0">

  <div class="p-toolbar-group-start">
    <i class="pi pi-shop text-2xl mr-3 text-primary"></i>
    <span class="text-xl font-bold text-900">Food Ordering Platform</span>
  </div>

  <div class="p-toolbar-group-end flex align-items-center gap-3">
    <span class="text-600 font-medium hidden sm:block">
      Hola, {{ claims?.given_name || 'Usuario' }}
    </span>

    <p-avatar icon="pi pi-user" shape="circle" styleClass="bg-primary text-white"></p-avatar>

    <p-button icon="pi pi-sign-out" severity="danger" [text]="true" [rounded]="true" (onClick)="logout()"
      title="Cerrar Sesión">
    </p-button>
  </div>

</p-toolbar>
